<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>All Tickets</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>🛠 Admin - All Tickets</h2>

        <a href="/admin" class="btn btn-secondary">
            ← Back
        </a>

    </div>

    <table class="table table-bordered table-hover shadow">

        <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>User</th>

            <th>Message</th>

            <th>Category</th>

            <th>Priority</th>

            <th>Assigned Team</th>

            <th>Created At</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="ticket : ${tickets}">

            <td th:text="${ticket.id}"></td>

            <td th:text="${ticket.user != null ? ticket.user.email : 'N/A'}"></td>

            <td th:text="${ticket.message}"></td>

            <td th:text="${ticket.category}"></td>

            <td th:text="${ticket.priority}"></td>

            <td th:text="${ticket.assignedTeam}"></td>

            <td th:text="${ticket.createdAt}"></td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>

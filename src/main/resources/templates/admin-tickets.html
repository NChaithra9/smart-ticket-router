<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Admin | All Tickets</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Custom CSS -->

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h1 class="page-title">

                <i class="bi bi-list-task text-primary me-2"></i>

                All Support Tickets

            </h1>

            <p class="page-subtitle">

                Review every ticket submitted in the system.

            </p>

        </div>

        <a th:href="@{/admin}"
           class="btn btn-outline-primary">

            <i class="bi bi-arrow-left me-2"></i>

            Dashboard

        </a>

    </div>

    <!-- Search + Priority Filter -->

<div class="card p-3 mb-4">

    <div class="row g-3">

        <div class="col-md-8">

            <input
                    id="searchBox"
                    class="form-control"
                    type="text"
                    placeholder="Search tickets...">

        </div>

        <div class="col-md-4">

            <form method="get"
                  th:action="@{/admin/tickets}">

                <select
                        class="form-select"
                        name="priority"
                        onchange="this.form.submit()">

                    <option value="">
                        All Priorities
                    </option>

                    <option
                            th:each="priority : ${priorities}"
                            th:value="${priority}"
                            th:text="${priority}"
                            th:selected="${priority == selectedPriority}">
                    </option>

                </select>

            </form>

        </div>

    </div>

</div>

    <!-- Table -->

    <div class="card shadow-sm">

        <div class="table-responsive">

            <table
                    id="ticketTable"
                    class="table table-hover align-middle mb-0">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>

                    <th>User</th>

                    <th>Message</th>

                    <th>Category</th>

                    <th>Priority</th>

                    <th>Assigned Team</th>

                    <th>Created</th>

                </tr>

                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(tickets)}">

                    <td colspan="7"
                        class="text-center py-5">

                        <i class="bi bi-inbox display-5"></i>

                        <br><br>

                        No tickets available.

                    </td>

                </tr>

                <tr th:each="ticket : ${tickets}">

                    <td th:text="${ticket.id}"></td>

                    <td>

                        <span class="fw-semibold"
                              th:text="${ticket.user != null ? ticket.user.email : 'N/A'}">

                        </span>

                    </td>

                    <td th:text="${ticket.message}"></td>

                    <td>

                        <span class="badge bg-primary"
                              th:text="${ticket.category}">

                        </span>

                    </td>

                    <td>

                        <span
                                class="badge"
                                th:classappend="${ticket.priority.name() == 'HIGH'} ? ' bg-danger' :
                                                (${ticket.priority.name() == 'MEDIUM'} ? ' bg-warning text-dark' :
                                                ' bg-success')"
                                th:text="${ticket.priority}">

                        </span>

                    </td>

                    <td>

                        <span class="badge bg-info text-dark"
                              th:text="${ticket.assignedTeam}">

                        </span>

                    </td>

                    <td th:text="${ticket.createdAt}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>

const search=document.getElementById("searchBox");

search.addEventListener("keyup",function(){

const value=this.value.toLowerCase();

document.querySelectorAll("#ticketTable tbody tr").forEach(function(row){

row.style.display=row.innerText.toLowerCase().includes(value)?"":"none";

});

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

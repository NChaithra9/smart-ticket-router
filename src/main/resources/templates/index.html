<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <meta charset="UTF-8">

    <title>Smart Ticket Router</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">

    <div class="container">

        <span class="navbar-brand fw-bold">

            🎫 Smart Ticket Router

        </span>

        <div>

            <span class="text-white me-3">

                Welcome,
                <strong sec:authentication="name"></strong>

            </span>

            <a href="/my-tickets"
               class="btn btn-light btn-sm">

                My Tickets

            </a>

            <a sec:authorize="hasRole('ADMIN')"
               href="/admin"
               class="btn btn-warning btn-sm">

                Admin

            </a>

            <a href="/logout"
               class="btn btn-danger btn-sm">

                Logout

            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>

                Submit Support Ticket

            </h3>

        </div>

        <div class="card-body">

            <form th:action="@{/route}"
                  method="post"
                  th:object="${ticketRequest}">

                <div class="mb-3">

                    <label class="form-label">

                        Describe your issue

                    </label>

                    <textarea
                            class="form-control"
                            rows="6"
                            th:field="*{message}"
                            placeholder="Example: I forgot my password..."
                            required>

                    </textarea>

                </div>

                <button class="btn btn-primary">

                    Route Ticket

                </button>

            </form>

        </div>

    </div>

    <br>

    <div class="card shadow"
         th:if="${response!=null}">

        <div class="card-header bg-dark text-white">

            <h3>

                AI Routing Result

            </h3>

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>

                    <th width="30%">

                        Category

                    </th>

                    <td th:text="${response.category}"></td>

                </tr>

                <tr>

                    <th>

                        Priority

                    </th>

                    <td th:text="${response.priority}"></td>

                </tr>

                <tr>

                    <th>

                        Assigned Team

                    </th>

                    <td th:text="${response.assignedTeam}"></td>

                </tr>

                <tr>

                    <th>

                        Reason

                    </th>

                    <td th:text="${response.reason}"></td>

                </tr>

            </table>

        </div>

    </div>

    <br>

    <div class="card">

        <div class="card-header">

            Sample Tickets

        </div>

        <div class="card-body">

            <ul>

                <li>I forgot my password.</li>

                <li>I was charged twice.</li>

                <li>The application crashes after login.</li>

                <li>Please delete my account.</li>

                <li>Add dark mode.</li>

            </ul>

        </div>

    </div>

</div>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Register | Smart Ticket Router</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7">

            <div class="auth-card">

                <div class="text-center mb-4">

                    <i class="bi bi-person-plus-fill text-primary"
                       style="font-size:60px;"></i>

                    <h2 class="auth-title mt-3">

                        Create Account

                    </h2>

                    <p class="auth-subtitle">

                        Register to Smart Ticket Router

                    </p>

                </div>

                <form th:action="@{/register}"
                      th:object="${registerRequest}"
                      method="post">

                    <div class="mb-3">

                        <label class="form-label">

                            Full Name

                        </label>

                        <div class="input-group">

                            <span class="input-group-text">

                                <i class="bi bi-person-fill"></i>

                            </span>

                            <input
                                    type="text"
                                    th:field="*{name}"
                                    class="form-control"
                                    placeholder="Enter your name"
                                    required>

                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Email Address

                        </label>

                        <div class="input-group">

                            <span class="input-group-text">

                                <i class="bi bi-envelope-fill"></i>

                            </span>

                            <input
                                    type="email"
                                    th:field="*{email}"
                                    class="form-control"
                                    placeholder="Enter email"
                                    required>

                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Password

                        </label>

                        <div class="input-group">

                            <span class="input-group-text">

                                <i class="bi bi-lock-fill"></i>

                            </span>

                            <input
                                    type="password"
                                    id="password"
                                    th:field="*{password}"
                                    class="form-control"
                                    placeholder="Enter password"
                                    required>

                            <button
                                    class="btn btn-outline-secondary"
                                    type="button"
                                    onclick="togglePassword()">

                                <i id="eye"
                                   class="bi bi-eye-fill"></i>

                            </button>

                        </div>

                    </div>

                    <div class="d-grid">

                        <button
                                class="btn btn-primary btn-lg">

                            <i class="bi bi-person-check-fill me-2"></i>

                            Register

                        </button>

                    </div>

                </form>

                <hr>

                <div class="text-center">

                    Already have an account?

                    <br><br>

                    <a th:href="@{/login}"
                       class="btn btn-outline-primary">

                        <i class="bi bi-box-arrow-in-right me-2"></i>

                        Login

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function togglePassword(){

const password=document.getElementById("password");

const eye=document.getElementById("eye");

if(password.type==="password"){

password.type="text";

eye.classList.replace("bi-eye-fill","bi-eye-slash-fill");

}else{

password.type="password";

eye.classList.replace("bi-eye-slash-fill","bi-eye-fill");

}

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

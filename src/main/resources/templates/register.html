<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
</head>
<body>

<h2>Create Account</h2>

<form th:action="@{/register}" method="post">

    <input
            type="text"
            name="name"
            placeholder="Name"
            required>

    <br><br>

    <input
            type="email"
            name="email"
            placeholder="Email"
            required>

    <br><br>

    <input
            type="password"
            name="password"
            placeholder="Password"
            required>

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

</body>
</html>
